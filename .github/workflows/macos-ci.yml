name: macos-ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scaffold-and-libobs-smoke:
    name: macOS scaffold + pinned libobs smoke
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          brew update
          brew install pkg-config
          python3 -m venv "$RUNNER_TEMP/cmake-venv"
          "$RUNNER_TEMP/cmake-venv/bin/python" -m pip install 'cmake==3.28.4' ninja
          echo "$RUNNER_TEMP/cmake-venv/bin" >> "$GITHUB_PATH"

      - name: Verify upstream pin and fork guard
        run: |
          chmod +x scripts/*.sh packaging/macos/package-app.sh
          ./scripts/fork-guard.sh

      - name: Configure scaffold smoke without libobs
        run: cmake -S . -B build/scaffold -G Ninja -DSTREAMMATE_REQUIRE_LIBOBS=OFF

      - name: Build scaffold host and smoke
        run: cmake --build build/scaffold --target studio-host studio-host-smoke native-overlay-renderer-test user-plugin-portability-test

      - name: Run scaffold smoke
        run: ./build/scaffold/studio-host-smoke

      - name: Run lifecycle integration tests
        run: ctest --test-dir build/scaffold --output-on-failure

      - name: Enforce the upstream pin-set derivation guard against the pinned tree
        run: STREAMMATE_REQUIRE_OBS_TREE=1 python3 tests/integration/test_upstream_pin_sets.py

      - name: Fetch OBS version tag metadata for upstream CMake
        run: git -C external/obs-studio fetch --tags --force --depth 1 origin tag 32.1.2

      - name: Configure upstream OBS without Qt frontend
        run: |
          cmake -S external/obs-studio -B build/obs -G Xcode \
            -DCMAKE_PROJECT_INCLUDE="$PWD/cmake/obs-enable-swift.cmake" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DCMAKE_OBJC_FLAGS="-Wno-error=deprecated-declarations" \
            -DCMAKE_OBJCXX_FLAGS="-Wno-error=deprecated-declarations" \
            -DCMAKE_C_FLAGS="-Wno-error=deprecated-declarations" \
            -DCMAKE_CXX_FLAGS="-Wno-error=deprecated-declarations" \
            -DENABLE_UI=OFF \
            -DENABLE_SERVICE_UPDATES=OFF \
            -DENABLE_SCRIPTING=OFF \
            -DENABLE_WEBRTC=OFF \
            -DENABLE_VST=OFF \
            -DENABLE_AJA=OFF \
            -DENABLE_DECKLINK=OFF

      - name: Build libobs and required upstream modules
        run: |
          cmake --build build/obs --config RelWithDebInfo --target libobs
          cmake --build build/obs --config RelWithDebInfo --target libobs-opengl
          cmake --build build/obs --config RelWithDebInfo --target mac-avcapture
          cmake --build build/obs --config RelWithDebInfo --target mac-capture
          cmake --build build/obs --config RelWithDebInfo --target obs-outputs
          cmake --build build/obs --config RelWithDebInfo --target obs-x264
          cmake --build build/obs --config RelWithDebInfo --target rtmp-services
          cmake --build build/obs --config RelWithDebInfo --target coreaudio-encoder || true
          cmake --build build/obs --config RelWithDebInfo --target mac-videotoolbox || true
          cmake --build build/obs --config RelWithDebInfo --target obs-ffmpeg || true
          cmake --build build/obs --config RelWithDebInfo --target obs-browser || true

      - name: Locate built libobs
        id: libobs
        shell: bash
        run: |
          lib_binary="$(find build/obs -path '*/libobs.framework/Versions/A/libobs' -type f ! -path '*/EagerLinkingTBDs/*' | head -n 1)"
          if [[ -n "$lib_binary" ]]; then
            lib="$(dirname "$(dirname "$(dirname "$lib_binary")")")"
          else
            lib="$(find build/obs -path '*/libobs.framework' -type d ! -path '*/EagerLinkingTBDs/*' | head -n 1)"
          fi
          if [[ -z "$lib" ]]; then
            lib="$(find build/obs \( -name 'libobs*.dylib' -o -name 'libobs*.a' \) | head -n 1)"
          fi
          if [[ -z "$lib" ]]; then
            echo "libobs build artifact not found" >&2
            find build/obs -maxdepth 5 \( -name '*libobs*' -o -name '*.framework' \) -print >&2
            exit 1
          fi
          graphics_module="$(find build/obs \( -name 'libobs-opengl*.dylib' -o -name 'libobs-opengl*.so' \) -type f | head -n 1)"
          if [[ -z "$graphics_module" ]]; then
            echo "libobs-opengl build artifact not found" >&2
            find build/obs -maxdepth 8 -name '*opengl*' -print >&2
            exit 1
          fi
          obs_config="$(find build/obs -name obsconfig.h | head -n 1)"
          if [[ -z "$obs_config" ]]; then
            echo "generated obsconfig.h not found" >&2
            find build/obs -maxdepth 6 -name '*obsconfig*' -print >&2
            exit 1
          fi
          module_stage="$PWD/build/obs/streammate-plugin-stage"
          rm -rf "$module_stage"
          mkdir -p "$module_stage"
          for module in mac-avcapture mac-capture obs-outputs obs-x264 rtmp-services; do
            module_bundle="$(find build/obs/plugins -path "*/$module.plugin" -type d ! -path '*/EagerLinkingTBDs/*' | head -n 1)"
            if [[ -z "$module_bundle" ]]; then
              echo "required OBS plugin bundle not found: $module" >&2
              find build/obs/plugins -maxdepth 8 -name '*.plugin' -print >&2
              exit 1
            fi
            cp -R "$module_bundle" "$module_stage/"
          done
          for module in coreaudio-encoder mac-videotoolbox obs-ffmpeg; do
            module_bundle="$(find build/obs/plugins -path "*/$module.plugin" -type d ! -path '*/EagerLinkingTBDs/*' | head -n 1)"
            if [[ -n "$module_bundle" ]]; then
              cp -R "$module_bundle" "$module_stage/"
            fi
          done
          echo "library=$lib" >> "$GITHUB_OUTPUT"
          echo "graphics_module=$graphics_module" >> "$GITHUB_OUTPUT"
          echo "generated_include=$(dirname "$obs_config")" >> "$GITHUB_OUTPUT"
          echo "modules_dir=$module_stage" >> "$GITHUB_OUTPUT"

      - name: Configure obs_startup smoke against built libobs
        run: |
          cmake -S . -B build/host -G Ninja \
            -DSTREAMMATE_REQUIRE_LIBOBS=ON \
            -DSTREAMMATE_OBS_INCLUDE_DIR="$PWD/external/obs-studio/libobs" \
            -DSTREAMMATE_OBS_DEPS_INCLUDE_DIR="$PWD/external/obs-studio/.deps/obs-deps-2025-08-23-universal/include" \
            -DSTREAMMATE_OBS_DEPS_LIBRARY_DIR="$PWD/external/obs-studio/.deps/obs-deps-2025-08-23-universal/lib" \
            -DSTREAMMATE_OBS_GENERATED_INCLUDE_DIR="$PWD/${{ steps.libobs.outputs.generated_include }}" \
            -DSTREAMMATE_OBS_LIBRARY="$PWD/${{ steps.libobs.outputs.library }}"

      - name: Build obs_startup smoke and studio-host
        run: cmake --build build/host --target studio-host-smoke studio-host

      - name: Run obs_startup smoke headlessly
        run: ./build/host/studio-host-smoke

      # Spec 34 Capability 3 / chunk 34.H3: compile the in-tree OBS plugin module
      # and its HAS_LIBOBS smoke. No `|| true` — the module MUST compile.
      - name: Build native-overlay OBS plugin module and smoke
        run: cmake --build build/host --target streammate-native-overlay native-overlay-module-smoke

      - name: Run native-overlay module smoke headlessly
        run: |
          module_bin="build/host/streammate-native-overlay.plugin/Contents/MacOS/streammate-native-overlay"
          test -f "$module_bin"
          ./build/host/native-overlay-module-smoke "$module_bin" tests/unit/native_overlay_golden.txt

      # Spec 39 / NIF-H2: the redistributable in-tree test plugins + the
      # loads-but-registers-nothing fixture + the instance+render probe smoke.
      # No `|| true` — all three modules and the smoke MUST compile.
      - name: Build user-plugin test modules and probe smoke
        run: cmake --build build/host --target streammate-test-source streammate-test-filter streammate-test-noop streammate-test-crash streammate-test-hang user-plugin-module-smoke

      # The `compatible` matrix row for NIF-H2: instance creation from
      # preserved settings + a render probe through a real offscreen video
      # thread, for BOTH test plugins (load+registration alone never counts).
      - name: Run user-plugin instance+render probe smoke
        run: |
          src_bin="build/host/streammate-test-source.plugin/Contents/MacOS/streammate-test-source"
          flt_bin="build/host/streammate-test-filter.plugin/Contents/MacOS/streammate-test-filter"
          test -f "$src_bin"
          test -f "$flt_bin"
          ./build/host/user-plugin-module-smoke "$src_bin" "$flt_bin" "$PWD/${{ steps.libobs.outputs.graphics_module }}"

      - name: Package ad-hoc-signed bundle and checksum manifest
        run: |
          packaging/macos/package-app.sh \
            --host-bin build/host/studio-host \
            --smoke-bin build/host/studio-host-smoke \
            --info-plist packaging/macos/Info.plist \
            --libobs-framework "${{ steps.libobs.outputs.library }}" \
            --obs-modules-dir "${{ steps.libobs.outputs.modules_dir }}" \
            --obs-deps-lib-dir "$PWD/external/obs-studio/.deps/obs-deps-2025-08-23-universal/lib" \
            --obs-graphics-module "${{ steps.libobs.outputs.graphics_module }}" \
            --streammate-plugin build/host/streammate-native-overlay.plugin \
            --output-dir dist

      - name: Verify relocatable app artifact from scratch copy
        run: |
          scratch="$RUNNER_TEMP/streammate-studio-host-artifact-smoke"
          rm -rf "$scratch"
          mkdir -p "$scratch"
          cp -R dist/StreamMateStudioHost.app "$scratch/"
          "$scratch/StreamMateStudioHost.app/Contents/MacOS/studio-host-smoke" --version
          (cd dist && shasum -a 256 -c sha256-manifest.txt)

      - name: Run HAS_LIBOBS production-control verb smoke against packaged app
        run: |
          # The raw build/host binary cannot dlopen libobs-opengl.dylib (Frameworks
          # only exist inside the packaged bundle), so the verb smoke runs against
          # the relocatable app exactly as an installed host would.
          python3 tests/integration/test_production_control_verbs.py \
            dist/StreamMateStudioHost.app/Contents/MacOS/studio-host

      # Spec 39 / NIF-H2: REAL user-plugin loading end-to-end — the packaged
      # host loads the test plugins through the --user-plugins-manifest path
      # (obs_open_module per module between bundled load and post-load) and
      # plugins.report must show the registered-type deltas, every seeded
      # refusal class, restart determinism, and byte-identical user roots.
      - name: Run real user-plugin loading end-to-end against packaged app
        run: |
          depmiss="$RUNNER_TEMP/depmiss.plugin"
          rm -rf "$depmiss"
          cp -R build/host/streammate-test-source.plugin "$depmiss"
          bin="$depmiss/Contents/MacOS/streammate-test-source"
          dep="$(otool -L "$bin" | awk 'NR>1 && /libobs/ {print $1; exit}')"
          test -n "$dep"
          install_name_tool -change "$dep" /nonexistent/streammate-missing-dep.dylib "$bin"
          codesign -s - -f "$bin"
          STREAMMATE_EXPECT_LIBOBS=1 \
          STREAMMATE_TEST_SOURCE_PLUGIN="$PWD/build/host/streammate-test-source.plugin" \
          STREAMMATE_TEST_FILTER_PLUGIN="$PWD/build/host/streammate-test-filter.plugin" \
          STREAMMATE_TEST_NOOP_PLUGIN="$PWD/build/host/streammate-test-noop.plugin" \
          STREAMMATE_DEP_MISSING_PLUGIN="$depmiss" \
          STREAMMATE_NOEXPORTS_DYLIB="$PWD/dist/StreamMateStudioHost.app/Contents/Frameworks/libobs-opengl.dylib" \
          python3 tests/integration/test_user_plugin_loading.py \
            dist/StreamMateStudioHost.app/Contents/MacOS/studio-host

      # Spec 39 / NIF-H3: REAL crash/hang containment — the seeded crashing
      # module aborts a packaged-host boot mid-load (sentinel attribution),
      # the hanging module trips the load watchdog (deadline-exceeded sentinel
      # + bounded exit 65), later boots refuse both suspects while the
      # UNRELATED test-source module still loads, retry grants exactly one
      # fresh attempt, and the user plugin roots stay byte-identical.
      - name: Run seeded crash/hang containment end-to-end against packaged app
        run: |
          STREAMMATE_EXPECT_LIBOBS=1 \
          STREAMMATE_TEST_SOURCE_PLUGIN="$PWD/build/host/streammate-test-source.plugin" \
          STREAMMATE_TEST_CRASH_PLUGIN="$PWD/build/host/streammate-test-crash.plugin" \
          STREAMMATE_TEST_HANG_PLUGIN="$PWD/build/host/streammate-test-hang.plugin" \
          python3 tests/integration/test_plugin_crash_containment.py \
            dist/StreamMateStudioHost.app/Contents/MacOS/studio-host

      - name: Verify inside-out ad-hoc signature before upload
        run: |
          app="dist/StreamMateStudioHost.app"
          # Strict + recursive verification must run here: actions/upload-artifact
          # does not preserve the framework's Versions/Current symlinks, so a
          # post-download verify would be meaningless.
          codesign --verify --strict --deep --verbose=2 "$app"
          outer="$(codesign -dvvv "$app" 2>&1 | awk -F= '/^Identifier=/{print $2; exit}')"
          test "$outer" = "com.streammate.studio-host"
          # Every nested component gets its own distinct per-component identifier,
          # namespaced under com.streammate.studio-host.vendored.* (never the
          # outer one). The framework's is exactly the vendored libobs id.
          fw="$(codesign -dvvv "$app/Contents/Frameworks/libobs.framework" 2>&1 | awk -F= '/^Identifier=/{print $2; exit}')"
          test "$fw" = "com.streammate.studio-host.vendored.libobs"
          for plugin in "$app"/Contents/PlugIns/obs-plugins/*.plugin; do
            pid="$(codesign -dvvv "$plugin" 2>&1 | awk -F= '/^Identifier=/{print $2; exit}')"
            case "$pid" in
              com.streammate.studio-host.vendored.*) ;;
              *) echo "nested plugin identifier not namespaced: $pid" >&2; exit 1 ;;
            esac
            test "$pid" != "com.streammate.studio-host"
          done

      - name: Verify repack determinism before upload
        run: |
          packaging/macos/package-app.sh \
            --host-bin build/host/studio-host \
            --smoke-bin build/host/studio-host-smoke \
            --info-plist packaging/macos/Info.plist \
            --libobs-framework "${{ steps.libobs.outputs.library }}" \
            --obs-modules-dir "${{ steps.libobs.outputs.modules_dir }}" \
            --obs-deps-lib-dir "$PWD/external/obs-studio/.deps/obs-deps-2025-08-23-universal/lib" \
            --obs-graphics-module "${{ steps.libobs.outputs.graphics_module }}" \
            --streammate-plugin build/host/streammate-native-overlay.plugin \
            --output-dir dist-repack
          # Ad-hoc signatures are content-derived, so a second packaging of the
          # same build tree must produce byte-identical manifests.
          diff dist/sha256-manifest.txt dist-repack/sha256-manifest.txt
          rm -rf dist-repack

      # Spec 39 / NIF-H2: the artifact ships the test plugins OUTSIDE the app
      # bundle (test-plugins/, never Contents/PlugIns/obs-plugins) so local
      # NIF-V1 slices can exercise the real user-plugin loading path.
      - name: Stage redistributable test plugins into the artifact
        run: |
          mkdir -p dist/test-plugins
          cp -R build/host/streammate-test-source.plugin dist/test-plugins/
          cp -R build/host/streammate-test-filter.plugin dist/test-plugins/
          cp -R build/host/streammate-test-noop.plugin dist/test-plugins/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: streammate-studio-host-macos-libobs
          path: dist/
